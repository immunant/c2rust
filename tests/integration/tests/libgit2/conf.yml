requirements:
  ubuntu:
    apt:
      packages:
        - cmake
        - pkg-config

transpile:
  autogen: true
  binary: main # clar test runner's `main()` lives in tests/clar/main.c
  tflags: --reorganize-definitions --disable-refactoring

cargo.transpile:
  autogen: true

refactor:
  autogen: true
  transforms:
    - rename_unnamed
    - reorganize_definitions
    - shorten_imported_paths
    - remove_unused_labels
    - remove_literal_suffixes

cargo.refactor:
  autogen: true
